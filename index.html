<HTML> 
<TITLE>Script </TITLE> 
<BODY BGCOLOR=pink> 
<p id='demo'>Клікніть кнопку, щоб змінити макет параграфа</p>

<button onclick='myFunction()'>Тицни мене!</button>

<script>
function myFunction() {
  var x = document.getElementById('demo');
  x.style.fontSize = '25px'; 
  x.style.color = 'red'; 
}
</script>

</BODY> 
</HTML>
